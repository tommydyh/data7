name: Streamlit Deploy Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check Python syntax
      run: |
        python -m py_compile src/data_pipeline.py
        python -m py_compile src/model_pipeline.py
        python -m py_compile app.py
        echo "✅ Python syntax OK"

    - name: Check imports
      run: |
        python -c "import streamlit; print('✅ Streamlit OK')"
        python -c "import pandas; print('✅ Pandas OK')"
        python -c "import numpy; print('✅ NumPy OK')"
        python -c "import sklearn; print('✅ Scikit-learn OK')"
        python -c "import plotly; print('✅ Plotly OK')"
        python -c "import joblib; print('✅ Joblib OK')"

    - name: Verify config files
      run: |
        [ -f .streamlit/config.toml ] && echo "✅ config.toml exists" || echo "❌ config.toml missing"
        [ -f .streamlit/secrets.toml ] && echo "✅ secrets.toml exists" || echo "❌ secrets.toml missing"
        [ -f requirements.txt ] && echo "✅ requirements.txt exists" || echo "❌ requirements.txt missing"
        [ -f app.py ] && echo "✅ app.py exists" || echo "❌ app.py missing"
        [ -d src ] && echo "✅ src/ directory exists" || echo "❌ src/ missing"

    - name: Check src modules
      run: |
        python -c "from src.data_pipeline import standardize_name, get_data_path; print('✅ data_pipeline imports OK')"
        python -c "from src.model_pipeline import PlayerClusterEngine, calculate_kpis; print('✅ model_pipeline imports OK')"